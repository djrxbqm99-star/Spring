<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>user3::목록</title>
	</head>
	<body>
		<h3>User3 목록</h3>
		<a th:href="@{/static}">메인</a>
		<a th:href="@{/user3/register}">등록</a>
		<table border="1">
			<tr>
				<th>아이디</th>
				<th>이름</th>
				<th>생년월일</th>
				<th>전화번호</th>
				<th>주소</th>
			</tr>

			<tr th:each="dto:${dtoList}">
				<td>[[${dto.userid}]]</td>
				<td>[[${dto.name}]]</td>
				<td th:text="${dto.birth}">생일</td>
				<td th:text="${dto.hp}">전화번호</td>
				<td th:text="${dto.addr}">주소</td>

				<td>
					<a th:href="@{/user3/modify(userid=${dto.userid})}">
						수정
					</a>

					<a th:href="@{/user3/remove(userid=${dto.userid})}">
						삭제
					</a>
				</td>
			</tr>
		</table>	
	</body>
</html>
