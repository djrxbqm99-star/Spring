<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>user1::목록</title>
</head>
<body>
<h3>User1 목록</h3>
<a th:href="@{/}">처음으로</a>
<a th:href="@{/user1/register}">등록하기</a>
<table border="1">
	<tr>
		<th>아이디</th>
		<th>이름</th>
		<th>휴대폰</th>
		<th>나이</th>
		<th>관리</th>
	</tr>
	<tr th:each="dto:${dtoList}">
		<td>[[${dto.userid}]]</td>
		<td>[[${dto.name}]]</td>
		<td th:text="${dto.hp}">휴대폰</td>
		<td th:text="${dto.age}">나이</td>
		<td>
			<a th:href="@{/user1/modify(userid=${dto.userid})}">수정</a>
			<a href="#" class="btn-remove"
			   th:data-url="@{/user1/remove(userid=${dto.userid})}">삭제</a>
		</td>
	</tr>
</table>

<script>
	document.addEventListener("DOMContentLoaded", function(){
		var buttons = document.querySelectorAll(".btn-remove");
		buttons.forEach(function(btn){
			btn.addEventListener("click", function(e){
				e.preventDefault();
				var url = btn.getAttribute("data-url");
				if(confirm("삭제 하시겠습니까?")){
					location.href = url;
				}
			});
		});
	});
</script>
</body>
</html>
